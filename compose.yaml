services:
  db:
    image: postgres:16-alpine
    container_name: innersprings-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: innersprings
    volumes:
      - innersprings-pg-data:/var/lib/postgresql/data

volumes:
  innersprings-pg-data:
